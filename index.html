<style>
@font-face{
    font-family: 'AlteHaasGrotesk';
    src: url('AlteHaasGrotesk.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
    font-display: swap;
}

  :root{
    --bg:#070708;
    --card:rgba(18,18,20,0.55);
    --line:rgba(255,255,255,0.12);
    --glow:#ffffff;
    --text:#f5f5f5;
    --muted:#9a9a9e;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;
    width:100%;
    height:100%;
    background:var(--bg);
    overflow:hidden;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  canvas#bg{
    position:fixed;
    top:0;left:0;
    width:100%;
    height:100%;
    display:block;
  }
  .stage{
    position:relative;
    width:100%;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .card{
    position:relative;
    width:min(560px, 88vw);
    padding:48px 40px 32px;
    border-radius:22px;
    background:var(--card);
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
    border:1px solid rgba(255,255,255,0.08);
    box-shadow:
      0 0 60px rgba(0,0,0,0.6),
      0 0 0 1px rgba(255,255,255,0.03) inset;
    text-align:center;
    animation: rise 1.1s ease forwards;
    opacity:0;
    transform: translateY(18px);
  }
  @keyframes rise{
    to{ opacity:1; transform:translateY(0); }
  }
  .handle{
    font-family:'AlteHaasGrotesk', 'Segoe UI', system-ui, -apple-system, sans-serif;
    font-size:30px;
    font-weight:700;
    letter-spacing:0.5px;
    color:#fff;
    margin:0 0 6px;
    text-shadow:
      0 0 8px rgba(255,255,255,0.9),
      0 0 18px rgba(255,255,255,0.7),
      0 0 36px rgba(255,255,255,0.5),
      0 0 64px rgba(255,255,255,0.3);
    animation: pulseGlow 2.6s ease-in-out infinite;
  }
  @keyframes pulseGlow{
    0%, 100%{
      text-shadow:
        0 0 8px rgba(255,255,255,0.9),
        0 0 18px rgba(255,255,255,0.7),
        0 0 36px rgba(255,255,255,0.5),
        0 0 64px rgba(255,255,255,0.3);
    }
    50%{
      text-shadow:
        0 0 12px rgba(255,255,255,1),
        0 0 26px rgba(255,255,255,0.85),
        0 0 50px rgba(255,255,255,0.6),
        0 0 90px rgba(255,255,255,0.4);
    }
  }
  .tagline{
    margin:0 0 26px;
    font-size:12.5px;
    font-weight:600;
    letter-spacing:2.5px;
    text-transform:uppercase;
    color:var(--muted);
    text-shadow: 0 0 10px rgba(255,255,255,0.15);
  }
  .icons{
    display:flex;
    justify-content:center;
    gap:18px;
    flex-wrap:wrap;
  }
  .icon-btn{
    width:48px;
    height:48px;
    border-radius:14px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.08);
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    text-decoration:none;
    transition: transform .25s ease, background .25s ease, box-shadow .25s ease;
    position:relative;
    padding:0;
    cursor:pointer;
    font:inherit;
  }
  .icon-btn svg{
    width:22px;
    height:22px;
    fill:#fff;
    filter: drop-shadow(0 0 6px rgba(255,255,255,0.25));
  }
  .icon-btn:hover{
    transform: translateY(-4px) scale(1.06);
    background:rgba(255,255,255,0.12);
    box-shadow: 0 6px 22px rgba(255,255,255,0.18);
  }
  .icon-tip{
    position:absolute;
    bottom:calc(100% + 10px);
    left:50%;
    transform: translateX(-50%) translateY(4px);
    background:rgba(20,20,22,0.95);
    border:1px solid rgba(255,255,255,0.12);
    color:#fff;
    font-size:11px;
    font-weight:600;
    letter-spacing:0.3px;
    white-space:nowrap;
    padding:6px 10px;
    border-radius:8px;
    opacity:0;
    pointer-events:none;
    transition: opacity .2s ease, transform .2s ease;
    box-shadow: 0 4px 14px rgba(0,0,0,0.4);
  }
  .icon-tip::after{
    content:'';
    position:absolute;
    top:100%;
    left:50%;
    transform: translateX(-50%);
    border:5px solid transparent;
    border-top-color:rgba(20,20,22,0.95);
  }
  .icon-btn:hover .icon-tip{
    opacity:1;
    transform: translateX(-50%) translateY(0);
  }
  #discord-copy.copied{
    background: rgba(120,255,170,0.14);
    border-color: rgba(120,255,170,0.4);
  }
  #discord-copy.copied svg{
    fill:#7dffb0;
    filter: drop-shadow(0 0 6px rgba(125,255,176,0.6));
  }
  /* Touch devices have no real hover, so kill the hover tooltips for the
     social icons there. The Discord "Copied!" tip is shown explicitly via
     the .copied class instead of relying on :hover, so it still works. */
  @media (hover:none) and (pointer:coarse){
    .icon-tip{
      display:none;
    }
    #discord-copy.copied .icon-tip{
      display:block;
      opacity:1;
      transform: translateX(-50%) translateY(0);
    }
  }
  #mute-btn{
    position:fixed;
    right:18px;
    bottom:18px;
    width:46px;
    height:46px;
    border-radius:50%;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.1);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    z-index:10;
    transition: transform .25s ease, background .25s ease;
  }
  #mute-btn:hover{
    transform: scale(1.08);
    background:rgba(255,255,255,0.12);
  }
  #mute-btn svg{
    width:20px;
    height:20px;
    fill:#fff;
    filter: drop-shadow(0 0 6px rgba(255,255,255,0.25));
  }
  #icon-unmuted{ display:none; }
  #mute-btn.playing #icon-muted{ display:none; }
  #mute-btn.playing #icon-unmuted{ display:block; }
  @media (prefers-reduced-motion: reduce){
    .card{ animation:none; opacity:1; transform:none; }
    .handle{ animation:none; }
    .enter-bars span, .enter-text{ animation:none; }
  }
  #enter-overlay{
    position:fixed;
    inset:0;
    background:
      radial-gradient(circle at 50% 45%, rgba(255,255,255,0.05), transparent 55%),
      #070708;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:100;
    cursor:pointer;
    transition: opacity .6s ease;
  }
  #enter-overlay.fade-out{
    opacity:0;
    pointer-events:none;
  }
  .enter-inner{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:26px;
  }
  .enter-bars{
    display:flex;
    align-items:flex-end;
    gap:5px;
    height:54px;
  }
  .enter-bars span{
    display:block;
    width:5px;
    border-radius:3px;
    background:#fff;
    box-shadow: 0 0 10px rgba(255,255,255,0.7), 0 0 22px rgba(255,255,255,0.35);
    animation: bounceBar 1.1s ease-in-out infinite;
  }
  .enter-bars span:nth-child(1){ height:18px; animation-delay:-1.0s; }
  .enter-bars span:nth-child(2){ height:34px; animation-delay:-0.8s; }
  .enter-bars span:nth-child(3){ height:50px; animation-delay:-0.6s; }
  .enter-bars span:nth-child(4){ height:28px; animation-delay:-0.4s; }
  .enter-bars span:nth-child(5){ height:44px; animation-delay:-0.2s; }
  .enter-bars span:nth-child(6){ height:20px; animation-delay:-0.9s; }
  .enter-bars span:nth-child(7){ height:38px; animation-delay:-0.3s; }
  @keyframes bounceBar{
    0%, 100%{ transform: scaleY(0.35); opacity:0.55; }
    50%{ transform: scaleY(1); opacity:1; }
  }
  .enter-text{
    margin:0;
    font-family:'AlteHaasGrotesk', 'Segoe UI', system-ui, -apple-system, sans-serif;
    font-size:13px;
    font-weight:700;
    letter-spacing:3px;
    color:#fff;
    text-shadow: 0 0 10px rgba(255,255,255,0.6);
    animation: textFlicker 2.2s ease-in-out infinite;
  }
  @keyframes textFlicker{
    0%, 100%{ opacity:0.7; letter-spacing:3px; }
    50%{ opacity:1; letter-spacing:4px; }
  }

  @media (max-width: 480px){
    .card{
      width: 90vw;
      padding: 36px 22px 24px;
      border-radius: 18px;
    }
    .handle{
      font-size: 24px;
      margin-bottom: 4px;
    }
    .tagline{
      font-size: 10.5px;
      letter-spacing: 1.8px;
      margin-bottom: 22px;
    }
    .icons{
      gap: 12px;
    }
    .icon-btn{
      width: 42px;
      height: 42px;
      border-radius: 12px;
    }
    .icon-btn svg{
      width: 19px;
      height: 19px;
    }
    #mute-btn{
      width: 40px;
      height: 40px;
      right: 12px;
      bottom: 12px;
    }
    #mute-btn svg{
      width: 17px;
      height: 17px;
    }
    .enter-bars{
      height: 44px;
      gap: 4px;
    }
    .enter-bars span{
      width: 4px;
    }
    .enter-text{
      font-size: 11px;
      letter-spacing: 2px;
    }
  }
</style>
</head>

<script>
// Animated flowing wave lines background
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let w, h;
function resize(){
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

const lineCount = 70;
const lines = [];
for(let i=0;i<lineCount;i++){
  lines.push({
    offset: i,
    speed: 0.15 + Math.random()*0.25,
    amp: 20 + Math.random()*60,
    freq: 0.002 + Math.random()*0.003,
    phase: Math.random()*Math.PI*2,
    opacity: 0.08 + Math.random()*0.18,
    glow: Math.random() < 0.12,
  });
}

let t = 0;
function draw(){
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle = '#070708';
  ctx.fillRect(0,0,w,h);

  const spacing = h / lineCount * 1.4;
  lines.forEach((line, idx) => {
    const baseY = -100 + idx*spacing;
    ctx.beginPath();
    ctx.strokeStyle = `rgba(255,255,255,${line.opacity})`;
    ctx.lineWidth = line.glow ? 1.4 : 1;
    if(line.glow){
      ctx.shadowColor = 'rgba(255,255,255,0.9)';
      ctx.shadowBlur = 14;
    } else {
      ctx.shadowBlur = 0;
    }
    for(let x=0; x<=w; x+=6){
      const y = baseY
        + Math.sin(x*line.freq + t*line.speed + line.phase) * line.amp
        + Math.sin(x*line.freq*2.3 + t*line.speed*0.6) * line.amp*0.3;
      if(x===0) ctx.moveTo(x,y);
      else ctx.lineTo(x,y);
    }
    ctx.stroke();
  });
  ctx.shadowBlur = 0;

  t += 0.012;
  requestAnimationFrame(draw);
}
draw();

// background audio via Web Audio API for sample-accurate gapless looping,
// started by the click-to-enter overlay (satisfies browser autoplay rules
// cleanly, since it's a real, deliberate user click)
const muteBtn = document.getElementById('mute-btn');
const overlay = document.getElementById('enter-overlay');
const TARGET_VOLUME = 0.18;

let audioCtx, gainNode, sourceNode, audioBuffer;
let isMuted = false;
let started = false;

async function initAudio(){
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  gainNode = audioCtx.createGain();
  gainNode.gain.value = TARGET_VOLUME;
  gainNode.connect(audioCtx.destination);

  const response = await fetch('music.wav');
  const arrayBuffer = await response.arrayBuffer();
  audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
}

function startPlayback(){
  if (started || !audioBuffer) return;
  started = true;
  sourceNode = audioCtx.createBufferSource();
  sourceNode.buffer = audioBuffer;
  sourceNode.loop = true;
  sourceNode.connect(gainNode);
  sourceNode.start(0);
  muteBtn.classList.add('playing');
}

initAudio().catch(() => {});

overlay.addEventListener('click', () => {
  overlay.classList.add('fade-out');
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  if (audioBuffer) {
    startPlayback();
  } else {
    // audio still decoding — start as soon as it's ready
    initAudio().then(startPlayback).catch(() => {});
  }
  setTimeout(() => overlay.remove(), 700);
});

muteBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  if (!started) return;
  isMuted = !isMuted;
  gainNode.gain.value = isMuted ? 0 : TARGET_VOLUME;
  muteBtn.classList.toggle('playing', !isMuted);
});

// Discord username copy button
const discordBtn = document.getElementById('discord-copy');
const discordTip = discordBtn.querySelector('.icon-tip');
const discordIcon = document.getElementById('discord-icon');
const discordCheck = document.getElementById('discord-check');
const discordHandle = discordBtn.dataset.discord;
const tipDefault = discordBtn.dataset.tip;
discordTip.textContent = tipDefault;

discordBtn.addEventListener('click', async (e) => {
  e.stopPropagation();
  try {
    await navigator.clipboard.writeText(discordHandle);
  } catch (err) {
    const ta = document.createElement('textarea');
    ta.value = discordHandle;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
  }
  discordBtn.classList.add('copied');
  discordIcon.style.display = 'none';
  discordCheck.style.display = 'block';
  discordTip.textContent = 'Copied!';
  setTimeout(() => {
    discordBtn.classList.remove('copied');
    discordIcon.style.display = 'block';
    discordCheck.style.display = 'none';
    discordTip.textContent = tipDefault;
  }, 1600);
});

</script>
